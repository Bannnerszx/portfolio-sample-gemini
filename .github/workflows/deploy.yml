name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Step 1: GitHub automatically converts your plain text secret to clean Base64
      - name: Prepare Environment File
        env:
          RAW_ENV: ${{ secrets.ENV_CONTENT }}
        run: |
          B64_ENV=$(echo -n "$RAW_ENV" | base64 -w 0)
          echo "B64_ENV=$B64_ENV" >> $GITHUB_ENV

      # Step 2: SSH into VM, decode the file, and restart Docker
      - name: SSH Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          B64_ENV: ${{ env.B64_ENV }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: B64_ENV
          script: |
            set -euo pipefail
            cd ~/portfolio-sample-gemini
            
            # Write to .env and strip Windows line endings (\r) automatically
            echo "$B64_ENV" | base64 -d | tr -d '\r' > .env
            
            docker compose up -d --build
            docker image prune -f