name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. GitHub downloads your code inside the GitHub Action runner
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. Upload your project files directly to the VM via SSH (No git clone needed!)
      - name: Copy project files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "."
          target: "~/portfolio-sample-gemini"

      # 3. Create .env file and rebuild Docker containers on the VM
      - name: Deploy Docker container on VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE_B64: ${{ secrets.ENV_FILE_B64 }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: ENV_FILE_B64
          script: |
            set -euo pipefail
            cd ~/portfolio-sample-gemini
            printf '%s' "$ENV_FILE_B64" | tr -d ' ' | base64 -d | tr -d '\r' > .env
            docker compose up -d --build app
            docker image prune -f